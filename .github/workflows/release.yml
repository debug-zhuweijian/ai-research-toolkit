name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Run Public Safety Scan
        run: python scripts/scan-public-safety.py --tree

      - name: Extract Release Notes
        run: |
          mkdir -p dist
          python scripts/extract-release-notes.py --tag "$GITHUB_REF_NAME" --output dist/release-notes.md

      - name: Scan Release Notes
        run: python scripts/scan-public-safety.py --paths dist/release-notes.md

      - name: Detect Release Metadata
        id: release_meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *"-alpha"* || "$tag" == *"-beta"* || "$tag" == *"-rc"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=legacy" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          body_path: dist/release-notes.md
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          make_latest: ${{ steps.release_meta.outputs.make_latest }}
